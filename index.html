  .bg-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(26,39,68,0.6) 0%, rgba(26,39,68,0.4) 50%, rgba(26,39,68,0.7) 100%);

  .page { display: none; position: relative; z-index: 1; min-height: 100vh; }
  .page.active { display: flex; flex-direction: column; align-items: center; }

  /* ── HEADER ── */
  .header {
    width: 100%; max-width: 960px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 32px 16px;
    border-bottom: 1px solid rgba(201,150,12,0.35);
  }
  .logo-img {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    object-fit: cover;
    box-shadow: 0 0 18px rgba(201,150,12,0.3);
  }
  .header-center { text-align: center; flex: 1; padding: 0 20px; }
  .college-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.55rem; font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.5px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .system-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem; font-weight: 500;
    color: rgba(253,248,240,0.85);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── LOGIN PAGE ── */
  #login-page { justify-content: flex-start; }

  .login-card {
    margin: 48px auto 0;
    background: rgba(15,25,55,0.75);
    border: 1px solid rgba(201,150,12,0.4);
    border-radius: 16px;
    padding: 40px 48px;
    width: 100%; max-width: 420px;
    backdrop-filter: blur(12px);
  }
  .login-card h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.3rem; font-weight: 600;
    color: var(--gold-light);
    text-align: center;
    margin-bottom: 30px;
    letter-spacing: 1px;
  }
  .field { margin-bottom: 22px; }
  .field label {
    display: block;
    font-size: 0.82rem; font-weight: 600;
    color: rgba(253,248,240,0.65);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 7px;
  }
  .field input {
    width: 100%; padding: 11px 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(201,150,12,0.35);
    border-radius: 8px;
    color: var(--cream); font-size: 1rem;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    font-family: 'Source Sans 3', sans-serif;
  }
  .field input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,150,12,0.15);
  }
  .login-btn {
    width: 100%; padding: 13px;
    background: var(--gold);
    border: none; border-radius: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem; font-weight: 700;
    color: var(--navy); cursor: pointer;
    letter-spacing: 1.5px; text-transform: uppercase;
    transition: background 0.2s, transform 0.15s;
    margin-top: 6px;
  }
  .login-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
  .login-btn:active { transform: translateY(0); }
  .error-msg {
    color: #e74c3c; font-size: 0.85rem;
    text-align: center; margin-top: 14px;
    min-height: 20px;
    font-weight: 600;
  }

  /* ── DASHBOARD PAGE ── */
  #dashboard-page { justify-content: flex-start; }

  .dash-toolbar {
    width: 100%; max-width: 960px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 32px;
  }
  .user-badge {
    font-size: 0.82rem; font-weight: 600;
    color: rgba(253,248,240,0.55);
    letter-spacing: 1px; text-transform: uppercase;
  }
  .user-badge span { color: var(--gold-light); }
  .logout-btn {
    padding: 6px 18px;
    background: transparent;
    border: 1px solid rgba(201,150,12,0.4);
    border-radius: 6px;
    color: rgba(253,248,240,0.7);
    font-size: 0.82rem; font-weight: 600;
    cursor: pointer; letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.2s;
  }
  .logout-btn:hover { border-color: var(--gold); color: var(--gold-light); }

  .parking-table-wrap {
    width: 100%; max-width: 860px;
    margin: 12px auto 0;
    padding: 0 24px 40px;
  }

  /* ALL SLOTS FULL ALERT */
  .full-alert {
    display: none;
    background: rgba(192,57,43,0.18);
    border: 1px solid rgba(192,57,43,0.6);
    border-radius: 10px;
    padding: 18px 28px;
    text-align: center;
    margin-bottom: 18px;
    animation: flashAlert 1.2s ease-in-out infinite;
  }
  .full-alert.visible { display: block; }
  .full-alert p {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.4rem; font-weight: 700;
    color: #e74c3c;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  @keyframes flashAlert {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  table {
    width: 100%; border-collapse: collapse;
    background: rgba(10,18,45,0.7);
    border: 1px solid rgba(201,150,12,0.3);
    border-radius: 12px;
    overflow: hidden;
    backdrop-filter: blur(10px);
  }
  thead tr { background: rgba(201,150,12,0.15); border-bottom: 1px solid rgba(201,150,12,0.4); }
  thead th {
    padding: 14px 20px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem; font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 1.5px; text-transform: uppercase;
    text-align: center;
  }
  tbody tr { border-bottom: 1px solid rgba(201,150,12,0.12); transition: background 0.2s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(201,150,12,0.06); }
  tbody td {
    padding: 16px 20px; text-align: center;
    font-size: 0.95rem; color: var(--cream);
    font-family: 'Source Sans 3', sans-serif;
  }
  .slot-label {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600; font-size: 1rem;
    letter-spacing: 1px;
  }
  .status-badge {
    display: inline-block;
    padding: 4px 18px;
    border-radius: 20px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem; font-weight: 700;
    letter-spacing: 1px;
  }
  .status-empty { background: rgba(39,174,96,0.18); color: #2ecc71; border: 1px solid rgba(39,174,96,0.4); }
  .status-filled { background: rgba(192,57,43,0.18); color: #e74c3c; border: 1px solid rgba(192,57,43,0.4); }

  .toggle-btn {
    padding: 6px 16px;
    border-radius: 6px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem; font-weight: 700;
    cursor: pointer; letter-spacing: 1px;
    border: 1px solid rgba(201,150,12,0.4);
    background: rgba(201,150,12,0.1);
    color: var(--gold-light);
    transition: all 0.2s;
  }
  .toggle-btn:hover { background: rgba(201,150,12,0.25); }
  .toggle-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .eng-time { font-size: 0.85rem; color: rgba(253,248,240,0.6); font-family: 'Source Sans 3', monospace; }

  .last-updated {
    text-align: center; margin-top: 12px;
    font-size: 0.75rem; color: rgba(253,248,240,0.35);
    letter-spacing: 0.5px;
  }

  @media (max-width: 600px) {
    .header { padding: 14px 16px 10px; }
    .college-name { font-size: 1.1rem; }
    .logo-img { width: 52px; height: 52px; }
    .login-card { padding: 28px 22px; margin: 28px 16px 0; }
    .parking-table-wrap { padding: 0 8px 32px; }
    thead th { padding: 10px 8px; font-size: 0.75rem; }
    tbody td { padding: 12px 8px; font-size: 0.85rem; }
  }
</style>
</head>

<!-- ══════════ LOGIN PAGE ══════════ -->
<div class="page active" id="login-page">

const FIREBASE_URL = 'https://smartparkingsystemgpcs-default-rtdb.asia-southeast1.firebasedatabase.app/';

const USERS = {
  'admin_head': { password: 'admin@123', canEdit: true  },
  'GPCS001':   { password: 'gpcs@123',  canEdit: false },
  'GPCS002':   { password: 'gpcs@123',  canEdit: false },
  'GPCS003':   { password: 'gpcs@123',  canEdit: false },
};

const SLOTS = ['SLOT-1','SLOT-2','SLOT-3','SLOT-4','SLOT-5'];
let currentUser = null;
let db = null;
let liveTimer = null;

// ── IMAGE INJECTION ──────────────────────────────────────
document.querySelectorAll('.logo-img').forEach(el => el.src = LOGO_SRC);
document.getElementById('bgImg').style.backgroundImage = `url('${BG_SRC}')`;

// ── FIREBASE INIT ────────────────────────────────────────
try {
  const app = firebase.initializeApp({
    databaseURL: FIREBASE_URL,
    appId: 'smart-parking-gpcs',
    apiKey: 'notneeded',
    projectId: 'smartparkingsystemgpcs',
  });
  db = firebase.database(app);
  console.log('Firebase connected');
} catch(e) { console.error('Firebase init failed', e); }

// ── HELPERS ──────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function formatDuration(ms) {
  if (!ms || ms < 0) return '–';
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  const h = Math.floor(m/60);
  if (h > 0) return `${h}h ${m%60}m`;
  if (m > 0) return `${m}m ${s%60}s`;
  return `${s}s`;
}

// ── LOGIN ────────────────────────────────────────────────
function doLogin() {
  const id   = document.getElementById('loginId').value.trim();
  const pass = document.getElementById('loginPass').value;
  const err  = document.getElementById('loginErr');

  if (!USERS[id]) { err.textContent = 'Invalid user ID.'; return; }
  if (USERS[id].password !== pass) { err.textContent = 'Incorrect password.'; return; }

  err.textContent = '';
  currentUser = id;
  document.getElementById('currentUserLabel').textContent = id;
  document.getElementById('actionHead').style.display = USERS[id].canEdit ? '' : 'none';
  showPage('dashboard-page');
  startDashboard();
}

document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('loginId').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginPass').focus();
});

// ── LOGOUT ───────────────────────────────────────────────
function doLogout() {
  if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }
  currentUser = null;
  document.getElementById('loginId').value   = '';
  document.getElementById('loginPass').value = '';
  showPage('login-page');
}

// ── DASHBOARD ────────────────────────────────────────────
function startDashboard() {
  if (!db) { renderFallback(); return; }
  // Initialise slots in Firebase if they don't exist
  SLOTS.forEach(slot => {
    const ref = db.ref('slots/' + slot);
    ref.once('value', snap => {
      if (!snap.exists()) {
        ref.set({ status: 'EMPTY', filledAt: null, totalEngagedMs: 0 });
      }
    });
  });
  // Live listener
  db.ref('slots').on('value', snap => {
    const data = snap.val() || {};
    renderTable(data);
    document.getElementById('lastUpdated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
  });
  // Clock for live elapsed display
  liveTimer = setInterval(tickElapsed, 1000);
}

function renderTable(data) {
  const canEdit = currentUser && USERS[currentUser].canEdit;
  const tbody = document.getElementById('slotTableBody');
  tbody.innerHTML = '';
  let filledCount = 0;

  SLOTS.forEach(slot => {
    const info = (data && data[slot]) ? data[slot] : { status:'EMPTY', filledAt: null, totalEngagedMs: 0 };
    const isFilled = info.status === 'FILLED';
    if (isFilled) filledCount++;

    const tr = document.createElement('tr');
    tr.dataset.slot     = slot;
    tr.dataset.status   = info.status;
    tr.dataset.filledAt = info.filledAt || '';
    tr.dataset.totalMs  = info.totalEngagedMs || 0;

    const actionCell = canEdit
      ? `<td><button class="toggle-btn" onclick="toggleSlot('${slot}','${info.status}')">${isFilled ? 'Mark Empty' : 'Mark Filled'}</button></td>`
      : `<td style="display:none"></td>`;

    const engagedMs = parseInt(info.totalEngagedMs || 0);
    const liveEl = isFilled && info.filledAt
      ? `<span class="eng-time live-tick" data-filled="${info.filledAt}" data-base="${engagedMs}">…</span>`
      : `<span class="eng-time">${formatDuration(engagedMs)}</span>`;

    tr.innerHTML = `
      <td class="slot-label">${slot}</td>
      <td><span class="status-badge ${isFilled ? 'status-filled' : 'status-empty'}">${info.status}</span></td>
      ${actionCell}`;
    tbody.appendChild(tr);
  });

  // Flash all-full alert
  const alert = document.getElementById('fullAlert');
  if (filledCount === SLOTS.length) {
    alert.classList.add('visible');
  } else {
    alert.classList.remove('visible');
  }

  tickElapsed(); // immediate tick
}

function tickElapsed() {
  const now = Date.now();
  document.querySelectorAll('.live-tick').forEach(el => {
    const filledAt = parseInt(el.dataset.filled || 0);
    const base     = parseInt(el.dataset.base || 0);
    const elapsed  = filledAt ? (now - filledAt + base) : base;
    el.textContent = formatDuration(elapsed);
  });
}

function renderFallback() {
  // If Firebase unavailable, show static demo
  const demo = {};
  SLOTS.forEach(s => { demo[s] = { status:'EMPTY', filledAt: null, totalEngagedMs: 0 }; });
  renderTable(demo);
}

// ── TOGGLE SLOT (admin only) ─────────────────────────────
function toggleSlot(slot, currentStatus) {
  if (!db) return;
  const ref = db.ref('slots/' + slot);
  const now = Date.now();

  ref.once('value', snap => {
    const info = snap.val() || {};
    if (currentStatus === 'EMPTY') {
      // Filling
      ref.update({ status: 'FILLED', filledAt: now });
    } else {
      // Emptying — accumulate elapsed
      const filledAt     = parseInt(info.filledAt || now);
      const prevTotal    = parseInt(info.totalEngagedMs || 0);
      const newTotal     = prevTotal + (now - filledAt);
      ref.update({ status: 'EMPTY', filledAt: null, totalEngagedMs: newTotal });
    }
  });
}
